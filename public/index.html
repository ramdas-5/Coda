<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coda · Calendar</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">Coda</div>
      <ul class="nav-menu">
        <li><a href="/" class="active">Calendar</a></li>
        <li><a href="/tasks">Tasks</a></li>
        <li class="profile-container">
          <div class="profile-icon" id="profileIcon"><i class="fas fa-user-circle"></i></div>
          <div class="dropdown-menu" id="dropdownMenu">
            <div class="user-email" id="userEmail">Loading...</div>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <!-- Calendar Header -->
    <div class="calendar-header">
      <button class="btn-icon" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
      <h2 id="monthYearDisplay"></h2>
      <button class="btn-icon" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid" id="calendarGrid"></div>

    <!-- Task Panel (Add/Edit) -->
    <div class="task-panel glass" id="taskPanel" style="display: none;">
      <div class="panel-left">
        <h3><i class="fas fa-plus-circle"></i> Add Task</h3>
        <form id="taskForm">
          <input type="hidden" id="taskId" value="">
          <input type="hidden" id="selectedDate" value="">
          <div class="form-group">
            <label for="taskName">Task name</label>
            <input type="text" id="taskName" placeholder="e.g., Design review" required>
          </div>
          <div class="form-group">
            <label for="taskDetails">Description</label>
            <textarea id="taskDetails" rows="3" placeholder="Add details..."></textarea>
          </div>
          <div class="form-group checkbox">
            <label class="checkbox-label">
              <input type="checkbox" id="dailyReminder">
              <span class="checkbox-custom"></span>
              Daily reminder
            </label>
          </div>
          <div id="reminderOptions" class="reminder-options" style="display: none;">
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="reminderType" value="everyday" checked>
                <span class="radio-custom"></span>
                Every day
              </label>
              <label class="radio-label">
                <input type="radio" name="reminderType" value="specific">
                <span class="radio-custom"></span>
                Specific days
              </label>
            </div>
            <div id="specificDays" class="specific-days" style="display: none;">
              <input type="checkbox" id="dayMon" value="Monday">
              <label for="dayMon">Mon</label>
              <input type="checkbox" id="dayTue" value="Tuesday">
              <label for="dayTue">Tue</label>
              <input type="checkbox" id="dayWed" value="Wednesday">
              <label for="dayWed">Wed</label>
              <input type="checkbox" id="dayThu" value="Thursday">
              <label for="dayThu">Thu</label>
              <input type="checkbox" id="dayFri" value="Friday">
              <label for="dayFri">Fri</label>
              <input type="checkbox" id="daySat" value="Saturday">
              <label for="daySat">Sat</label>
              <input type="checkbox" id="daySun" value="Sunday">
              <label for="daySun">Sun</label>
            </div>
          </div>
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Save Task</button>
            <button type="button" id="cancelTask" class="btn-secondary">Cancel</button>
          </div>
        </form>
      </div>
      <div class="panel-right">
        <h3><i class="fas fa-tasks"></i> Tasks on <span id="selectedDateDisplay"></span></h3>
        <div id="tasksForDate" class="task-list"></div>
      </div>
    </div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="confirmModal" class="modal confirm-modal">
    <div class="modal-content glass">
      <h3><i class="fas fa-exclamation-triangle"></i> Confirm Deletion</h3>
      <p id="confirmMessage">Are you sure you want to delete this task?</p>
      <div class="modal-actions">
        <button id="confirmCancel" class="btn-secondary">Cancel</button>
        <button id="confirmDelete" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-section">
        <span class="footer-brand">Coda</span>
        <span class="footer-tagline">Organize your tasks smarter.</span>
      </div>
      <div class="footer-section">
        <span class="footer-credit">Developed by Ramdas Hembram</span>
      </div>
      <div class="footer-section">
        <a href="https://github.com/ramdas-5" class="footer-link"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com/in/dev-ramdas-hembram" class="footer-link"><i class="fab fa-linkedin"></i></a>
        <a href="mailto:ramdashembram05@gmail.com" class="footer-link"><i class="fas fa-envelope"></i></a>
      </div>
    </div>
  </footer>

  <!-- Popup container for toast notifications -->
  <div id="popup-container"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/calendar.js"></script>
  <script>
    (function() {
      const profileIcon = document.getElementById('profileIcon');
      const dropdown = document.getElementById('dropdownMenu');
      const userEmailSpan = document.getElementById('userEmail');
      let isClickedOpen = false;

      fetch('/api/auth/me')
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(data => { userEmailSpan.textContent = data.email; })
        .catch(() => { userEmailSpan.textContent = 'Not logged in'; });

      profileIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        isClickedOpen = !isClickedOpen;
        dropdown.classList.toggle('show', isClickedOpen);
      });

      profileIcon.addEventListener('mouseenter', () => { if (!isClickedOpen) dropdown.classList.add('show'); });
      profileIcon.addEventListener('mouseleave', () => { if (!isClickedOpen) dropdown.classList.remove('show'); });
      dropdown.addEventListener('mouseenter', () => { if (!isClickedOpen) dropdown.classList.add('show'); });
      dropdown.addEventListener('mouseleave', () => { if (!isClickedOpen) dropdown.classList.remove('show'); });
      document.addEventListener('click', (e) => {
        if (!profileIcon.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.remove('show');
          isClickedOpen = false;
        }
      });
    })();
  </script>
</body>
</html>
