<!-- public/index.html (full file after fix) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coda - Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <div class="nav-brand">Coda</div>
    <ul>
      <li><a href="/" class="active">Calendar</a></li>
      <li><a href="/tasks">Task List</a></li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </nav>
  <main>
    <div class="calendar-header">
      <button id="prevMonth">&lt;</button>
      <h2 id="monthYearDisplay"></h2>
      <button id="nextMonth">&gt;</button>
    </div>
    <div class="calendar-grid" id="calendarGrid">
      <!-- Days will be generated by JS -->
    </div>
    <div class="task-panel" id="taskPanel" style="display: none;">
      <div class="panel-left">
        <h3>Add Task</h3>
        <form id="taskForm">
          <input type="hidden" id="taskId" value="">
          <input type="hidden" id="selectedDate" value="">
          <div class="form-group">
            <label for="taskName">Task Name</label>
            <input type="text" id="taskName" required>
          </div>
          <div class="form-group">
            <label for="taskDetails">Task Details</label>
            <textarea id="taskDetails" rows="3"></textarea>
          </div>
          <!-- Time input removed -->
          <div class="form-group checkbox">
            <label>
              <input type="checkbox" id="dailyReminder"> Daily Reminder
            </label>
          </div>
          <div id="reminderOptions" style="display: none;">
            <div class="form-group">
              <label>
                <input type="radio" name="reminderType" value="everyday" checked> Apply Every Day
              </label>
              <label>
                <input type="radio" name="reminderType" value="specific"> Specific Days
              </label>
            </div>
            <div id="specificDays" style="display: none;">
              <label><input type="checkbox" value="Monday"> Monday</label>
              <label><input type="checkbox" value="Tuesday"> Tuesday</label>
              <label><input type="checkbox" value="Wednesday"> Wednesday</label>
              <label><input type="checkbox" value="Thursday"> Thursday</label>
              <label><input type="checkbox" value="Friday"> Friday</label>
              <label><input type="checkbox" value="Saturday"> Saturday</label>
              <label><input type="checkbox" value="Sunday"> Sunday</label>
            </div>
          </div>
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
          <button type="submit">Save Task</button>
          <button type="button" id="cancelTask">Cancel</button>
        </form>
      </div>
      <div class="panel-right" id="taskListPanel">
        <h3>Tasks on <span id="selectedDateDisplay"></span></h3>
        <div id="tasksForDate"></div>
      </div>
    </div>
  </main>
  <script src="/js/auth.js"></script>
  <script src="/js/calendar.js"></script>
</body>
</html>
