<!-- public/signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coda · Sign Up</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assest/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-spacer">
    <div class="auth-card glass">
      <div class="auth-header">
        <img src="/assest/logo.png" alt="Coda Logo" class="auth-logo">
        <h2>Get started</h2>
        <p>Create your Coda account</p>
      </div>
      <form id="signupForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required>
            <span class="toggle-password" onclick="togglePassword('password', this)"><i class="far fa-eye"></i></span>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
            <span class="toggle-password" onclick="togglePassword('confirmPassword', this)"><i class="far fa-eye"></i></span>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-block">Sign Up</button>
        <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
      </form>
      <div id="error" class="error-message"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-section">
        <span class="footer-brand">Coda</span>
        <span class="footer-tagline">Organize your tasks smarter.</span>
      </div>
      <div class="footer-section">
        <span class="footer-credit">Developed by Ramdas Hembram</span>
      </div>
      <div class="footer-section">
        <a href="https://github.com/ramdas-5" class="footer-link"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com/in/dev-ramdas-hembram" class="footer-link"><i class="fab fa-linkedin"></i></a>
        <a href="mailto:ramdashembram05@gmail.com" class="footer-link"><i class="fas fa-envelope"></i></a>
      </div>
    </div>
  </footer>

  <script>
    function togglePassword(fieldId, icon) {
      const field = document.getElementById(fieldId);
      if (field.type === "password") {
        field.type = "text";
        icon.innerHTML = '<i class="far fa-eye-slash"></i>';
      } else {
        field.type = "password";
        icon.innerHTML = '<i class="far fa-eye"></i>';
      }
    }
    fetch('/api/auth/me').then(res => { if (res.ok) window.location.href = '/'; }).catch(() => {});
  </script>
  <script src="/js/auth.js"></script>
</body>
</html>
